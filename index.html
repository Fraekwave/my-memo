<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/inadone_icon.png" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="HandheldFriendly" content="true" />
    <meta name="color-scheme" content="light only" />
    <meta name="supported-color-schemes" content="light" />
    <meta name="theme-color" content="#fafaf5" />
    <script src="/viewport-fix.js"></script>
    <title>MamaVault - 엄마의 외장하드</title>
    <meta name="description" content="엄마의 외장하드 — 할 일과 말씀노트를 기록하세요" />
  </head>
  <body style="background-image:linear-gradient(#fafaf5,#fafaf5);background-color:#fafaf5;color:#1c1917">
    <div id="root"></div>
    <script>
      // Inline fallback: fix TWA viewport even if old SW serves stale HTML without viewport-fix.js
      // WebView ignores viewport meta on cold start → innerWidth=980 instead of device width
      (function(){
        if (window.innerWidth > window.screen.width * 1.5 && !sessionStorage.getItem('__vp_reloaded')) {
          sessionStorage.setItem('__vp_reloaded', '1');
          location.reload();
        }
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      if ('serviceWorker' in navigator && location.hostname !== 'localhost') {
        navigator.serviceWorker.register('/sw.js');
      }
    </script>
  </body>
</html>
