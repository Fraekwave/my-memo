<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/inadone_icon.png" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="HandheldFriendly" content="true" />
    <meta name="color-scheme" content="light only" />
    <script>
      // Fix TWA/standalone viewport scale race on Android (Samsung Galaxy etc.)
      // Re-stamp the viewport meta to force WebView to re-evaluate after DOM ready
      (function() {
        var vp = document.querySelector('meta[name="viewport"]');
        if (!vp) return;
        var content = vp.getAttribute('content');
        // Schedule after first paint so WebView has initialized its layout
        requestAnimationFrame(function() {
          vp.setAttribute('content', '');
          vp.setAttribute('content', content);
        });
      })();
    </script>
    <title>INA Done - Break your Plan</title>
    <meta name="description" content="프리미엄 미니멀 할 일 관리 앱" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      if ('serviceWorker' in navigator && location.hostname !== 'localhost') {
        navigator.serviceWorker.register('/sw.js');
      }
    </script>
  </body>
</html>
